<!-- cat.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi Cat's Cafe</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/loader.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/menu.css">
<link rel="stylesheet" href="css/categories.css">
<link rel="stylesheet" href="css/promo-banner.css">
</head>

<body>

<!-- 🔥 ЗАГРУЗОЧНЫЙ ЭКРАН -->
<div id="loader">
    <div class="decor-circle left"></div>
    <div class="decor-circle right"></div>
    <div class="logo-container">
        <img src="Images/logo.png" alt="Logo" class="loader-logo">
    </div>
</div>

<!-- 🏠 ГЛАВНЫЙ ЭКРАН (НОВЫЙ) -->
<div id="hero-section" class="hidden">
    <div class="decor-circle left"></div>
    <div class="decor-circle right"></div>
    <div class="vertical-text">寿司と快適さ</div>
    
    <div class="hero-logo-container">
        <img src="Images/logo.png" alt="Logo" class="hero-logo">
        <div class="hero-subtitle">Japanese Food Restaurant</div>
        <div class="hero-title">寿司<span>と</span>快適さ</div>
        <div class="hero-cafe-name">Sushi Cat's Cafe</div>
        <div class="hero-slogan">with love and with a soul</div>
        <button class="hero-menu-btn" id="heroToMenuBtn">View Menu</button>
    </div>
</div>

<!-- 🍣 ПРИЛОЖЕНИЕ -->
<div id="app" class="hidden">

<header class="header">
    <nav class="nav">
        <div class="nav__item"><div class="nav__icon"><img src="Images/mesto.png"></div><span class="nav__text">Казань</span></div>
        <div class="nav__item"><div class="nav__icon"><img src="Images/poisk.png"></div><span class="nav__text">Поиск</span></div>

        <div class="nav-circle-container">
            <div class="separator-circle"></div>
            <img src="Images/logo1.png" class="loader1-logo">
        </div>

        <div class="nav__item"><div class="nav__icon"><img src="Images/korzina.png"></div><span class="nav__text">Корзина</span></div>
        <div class="nav__item"><div class="nav__icon"><img src="Images/account.png"></div><span class="nav__text">Аккаунт</span></div>
    </nav>
</header>

<!-- КАТЕГОРИИ -->
<div class="categories-wrapper">
    <nav class="categories">
        <div class="category-indicator" id="categoryIndicator"></div>
        <div class="categories-buttons">
            <button class="active" data-category="all">Все</button>
            <button data-category="rolls">Роллы</button>
            <button data-category="drinks">Напитки</button>
            <button data-category="dessert">Дессерты</button>
            <button data-category="sets">Сеты</button>
            <button data-category="sushi">Суши</button>
        </div>
    </nav>
</div>

<!-- МЕНЮ ИЗ БД -->
<main class="menu">
    <div class="menu-container" id="menu-container">
        ⏳ Загружаем меню...
    </div>
</main>

<!-- КОРЗИНА -->
<div class="cart-button">
    🛒 <span class="cart-count">0</span>
</div>

</div>

<!-- 🛒 МОДАЛЬНОЕ ОКНО КОРЗИНЫ -->
<div id="cart">
    <div class="cart-modal">
        <div class="cart-header">
            <h2>🛒 Ваша корзина</h2>
            <button class="close-cart" onclick="closeCart()">✕</button>
        </div>
        <div class="cart-items">
            <!-- Сюда будут добавляться товары -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Итого:</span>
                <span>0 ₽</span>
            </div>
            <button class="checkout-btn" onclick="alert('Оформление заказа будет доступно после авторизации')">
                Оформить заказ
            </button>
        </div>
    </div>
</div>

<!-- 👤 МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ -->
<div id="auth-modal" class="auth-modal">
    <div class="auth-modal-content">
        <div class="auth-header">
            <h2>Вход / Регистрация</h2>
            <button class="close-auth" onclick="closeAuthModal()">✕</button>
        </div>
        
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Вход</button>
            <button class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">Регистрация</button>
        </div>
        
        <!-- Форма входа -->
        <div id="login-form" class="auth-form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Введите email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="login-password" placeholder="Введите пароль">
            </div>
            <button class="auth-submit" onclick="handleLogin()">Войти</button>
        </div>
        
        <!-- Форма регистрации -->
        <div id="register-form" class="auth-form">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="register-name" placeholder="Введите имя">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="register-email" placeholder="Введите email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="register-password" placeholder="Введите пароль">
            </div>
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" id="register-confirm" placeholder="Повторите пароль">
            </div>
            <button class="auth-submit" onclick="handleRegister()">Зарегистрироваться</button>
        </div>
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
